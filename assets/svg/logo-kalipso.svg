  <!-- Anneau navy (extérieur) -->
  <circle class="logo-rings" cx="60" cy="60" r="46" fill="none" stroke="#1B2A4E" stroke-width="10"/>
  <!-- Anneau turquoise -->
  <circle class="logo-rings" cx="60" cy="60" r="35" fill="none" stroke="#2BA39A" stroke-width="8"/>
  <!-- Anneau jaune -->
  <circle class="logo-rings" cx="60" cy="60" r="25" fill="none" stroke="#F2C12E" stroke-width="8"/>
  <!-- Anneau rouge -->
  <circle class="logo-rings" cx="60" cy="60" r="16" fill="none" stroke="#D2382C" stroke-width="6"/>
